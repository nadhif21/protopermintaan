<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Forgot Password - Permintaan DOF</title>
    <script src="version.js?v=202603201816"></script>
    <link rel="stylesheet" href="login.css?v=202603201816">
    <link rel="stylesheet" href="forgot-password.css?v=202603201816">
</head>
<body>
    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="auth-logo-text">Permintaan DOF</div>
                </div>
            </div>

            <div class="auth-box">
                <div class="auth-box-header">
                    <span class="auth-icon">🔑</span>
                    <h1>Forgot Password</h1>
                    <p>Reset password dengan verifikasi OTP email</p>
                </div>

                <form id="forgotPasswordForm">
                    <div class="stepper" id="stepper">
                        <div class="step-item active" data-step="1">1. Email</div>
                        <div class="step-item" data-step="2">2. OTP</div>
                        <div class="step-item" data-step="3">3. Password Baru</div>
                    </div>

                    <div class="step-content active" id="stepEmail">
                        <div class="input-group">
                            <label for="email">Email Terdaftar</label>
                            <input type="email" id="email" placeholder="nama@email.com" required autocomplete="email">
                        </div>
                        <button type="button" class="auth-btn" id="requestOtpBtn">Kirim OTP</button>
                    </div>

                    <div class="step-content" id="stepOtp">
                        <div class="input-group">
                            <label>OTP (6 digit)</label>
                            <div class="otp-input-group" id="otpInputGroup">
                                <input type="text" class="otp-input" inputmode="numeric" maxlength="1" placeholder="_" autocomplete="one-time-code" aria-label="Digit OTP 1">
                                <input type="text" class="otp-input" inputmode="numeric" maxlength="1" placeholder="_" aria-label="Digit OTP 2">
                                <input type="text" class="otp-input" inputmode="numeric" maxlength="1" placeholder="_" aria-label="Digit OTP 3">
                                <input type="text" class="otp-input" inputmode="numeric" maxlength="1" placeholder="_" aria-label="Digit OTP 4">
                                <input type="text" class="otp-input" inputmode="numeric" maxlength="1" placeholder="_" aria-label="Digit OTP 5">
                                <input type="text" class="otp-input" inputmode="numeric" maxlength="1" placeholder="_" aria-label="Digit OTP 6">
                            </div>
                        </div>
                        <div class="action-row">
                            <button type="button" class="secondary-btn" id="backToEmailBtn">Kembali</button>
                            <button type="button" class="auth-btn" id="verifyOtpBtn">Verifikasi OTP</button>
                        </div>
                    </div>

                    <div class="step-content" id="stepReset">
                        <div class="input-group">
                            <label for="newPassword">Password Baru</label>
                            <div class="password-wrapper">
                                <input type="password" id="newPassword" placeholder="Minimal 8 karakter" autocomplete="new-password">
                                <button type="button" class="toggle-password" data-target="newPassword" title="Lihat password">
                                    <span class="eye-icon">👁️</span>
                                </button>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="confirmPassword">Konfirmasi Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="confirmPassword" placeholder="Ulangi password baru" autocomplete="new-password">
                                <button type="button" class="toggle-password" data-target="confirmPassword" title="Lihat password">
                                    <span class="eye-icon">👁️</span>
                                </button>
                            </div>
                        </div>

                        <div class="action-row">
                            <button type="button" class="secondary-btn" id="backToOtpBtn">Kembali</button>
                            <button type="button" class="auth-btn" id="resetPasswordBtn">Reset Password</button>
                        </div>
                    </div>
                </form>

                <div class="auth-footer">
                    <p><a href="https://infoadkor.com/permintaandof/login.html">Kembali ke login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js?v=202603201816"></script>
    <script src="forgot-password.js?v=202603201816"></script>
</body>
</html>
