<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Data Permintaan DOF</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <a href="index.html" class="back-link">← Kembali</a>
                <span class="header-icon">👤</span>
                <h1>Profile</h1>
                <button id="logoutBtn" class="logout-btn" title="Logout">🚪</button>
            </div>
        </header>

        <div class="profile-content">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <span class="avatar-icon">👤</span>
                    </div>
                    <h2 id="profileName">Loading...</h2>
                    <p id="profileRole" class="profile-role">Loading...</p>
                </div>

                <div class="profile-info">
                    <div class="info-item">
                        <label>Username</label>
                        <div class="info-value" id="profileUsername">-</div>
                    </div>
                    <div class="info-item">
                        <label>NPK</label>
                        <div class="info-value" id="profileNPK">-</div>
                    </div>
                    <div class="info-item">
                        <label>Email</label>
                        <div class="info-value" id="profileEmail">-</div>
                    </div>
                    <div class="info-item">
                        <label>Nomor Telepon</label>
                        <div class="info-value" id="profilePhone">-</div>
                    </div>
                    <div class="info-item">
                        <label>Unit Kerja</label>
                        <div class="info-value" id="profileUnitKerja">-</div>
                    </div>
                </div>

                <div class="profile-actions">
                    <button id="changePasswordBtn" class="btn-primary">
                        🔒 Ubah Password
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Reset Password -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Ubah Password</h2>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="passwordForm">
                    <div class="form-group">
                        <label for="oldPassword">Password Lama <span class="required">*</span></label>
                        <div class="password-input-wrapper">
                            <input type="password" id="oldPassword" name="oldPassword" required 
                                   placeholder="Masukkan password lama" autocomplete="current-password">
                            <button type="button" class="toggle-password" data-target="oldPassword">
                                <span class="eye-icon">👁️</span>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="newPassword">Password Baru <span class="required">*</span></label>
                        <div class="password-input-wrapper">
                            <input type="password" id="newPassword" name="newPassword" required 
                                   placeholder="Masukkan password baru" autocomplete="new-password">
                            <button type="button" class="toggle-password" data-target="newPassword">
                                <span class="eye-icon">👁️</span>
                            </button>
                        </div>
                        <div class="password-hint">
                            <small>Minimal 6 karakter</small>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Konfirmasi Password Baru <span class="required">*</span></label>
                        <div class="password-input-wrapper">
                            <input type="password" id="confirmPassword" name="confirmPassword" required 
                                   placeholder="Konfirmasi password baru" autocomplete="new-password">
                            <button type="button" class="toggle-password" data-target="confirmPassword">
                                <span class="eye-icon">👁️</span>
                            </button>
                        </div>
                    </div>

                    <div id="passwordError" class="error-message" style="display: none;"></div>
                    <div id="passwordSuccess" class="success-message" style="display: none;"></div>

                    <div class="modal-footer">
                        <button type="button" class="btn-secondary" id="cancelPasswordBtn">Batal</button>
                        <button type="submit" class="btn-primary" id="submitPasswordBtn">
                            <span>Ubah Password</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="profile.js"></script>
</body>
</html>
