<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persetujuan Permintaan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .container-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .detail-info-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: #f8f9fa;
        }

        .detail-info-wrapper::-webkit-scrollbar {
            width: 8px;
        }

        .detail-info-wrapper::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .detail-info-wrapper::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .detail-info-wrapper::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .detail-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .detail-item {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .detail-item label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-item .value {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .status-message {
            padding: 20px;
            text-align: center;
            font-weight: 600;
            border-radius: 8px;
            margin: 20px;
        }

        .status-message.loading {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-message.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-message.error {
            background: #ffebee;
            color: #c62828;
        }

        .footer-section {
            padding: 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 20px 32px;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn:hover:not(:disabled)::before {
            width: 400px;
            height: 400px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
        }

        .btn:active:not(:disabled) {
            transform: translateY(-2px) scale(1);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15) !important;
        }

        .btn span:first-child {
            font-size: 24px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .btn span:last-child {
            position: relative;
            z-index: 1;
        }

        .btn-approve {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 50%, #3d8b40 100%);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-approve:hover:not(:disabled) {
            background: linear-gradient(135deg, #45a049 0%, #3d8b40 50%, #2e7d32 100%);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-reject {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 50%, #c62828 100%);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-reject:hover:not(:disabled) {
            background: linear-gradient(135deg, #d32f2f 0%, #c62828 50%, #b71c1c 100%);
            border-color: rgba(255, 255, 255, 0.3);
        }


        /* PIN Modal Styles */
        .pin-modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .pin-modal.show {
            display: flex;
        }

        .pin-modal-content {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .pin-modal-content h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
        }

        .pin-modal-content p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .pin-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .pin-input {
            width: 60px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .pin-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .pin-error {
            color: #f44336;
            font-size: 14px;
            margin-top: 10px;
            min-height: 20px;
        }

        .pin-submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .pin-submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .pin-submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @media (max-width: 600px) {
            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .detail-info-wrapper {
                padding: 20px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .footer-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">📋</div>
            <h1>Persetujuan Permintaan</h1>
            <p class="subtitle">Silakan tinjau detail permintaan di bawah</p>
        </div>
        
        <div id="statusMessage" class="status-message loading" style="display: none;">Memuat data...</div>
        
        <div class="container-content" id="mainContent" style="display: none;">
            <div id="detailInfoWrapper" class="detail-info-wrapper">
                <div id="detailInfo" class="detail-info"></div>
            </div>
        </div>
        
        <div class="footer-section" id="footerSection" style="display: none;">
            <div id="actionButtons" class="action-buttons">
                <button id="approveBtn" class="btn btn-approve">
                    <span>✅</span>
                    <span>Setujui Permintaan</span>
                </button>
                <button id="rejectBtn" class="btn btn-reject">
                    <span>❌</span>
                    <span>Tolak Permintaan</span>
                </button>
            </div>
        </div>
    </div>

    <!-- PIN Modal -->
    <div id="pinModal" class="pin-modal">
        <div class="pin-modal-content">
            <h2>🔐 Masukkan PIN</h2>
            <p>Masukkan 4 digit PIN untuk melanjutkan</p>
            <div class="pin-input-group">
                <input type="text" class="pin-input" id="pin1" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off">
                <input type="text" class="pin-input" id="pin2" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off">
                <input type="text" class="pin-input" id="pin3" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off">
                <input type="text" class="pin-input" id="pin4" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off">
            </div>
            <div id="pinError" class="pin-error"></div>
            <button id="pinSubmitBtn" class="pin-submit-btn">Verifikasi PIN</button>
        </div>
    </div>

    <script>
        const API_URL = '../api.php';
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showStatus(message, type) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.textContent = message;
            statusMessage.className = 'status-message ' + type;
            statusMessage.style.display = 'block';
        }
        
        function showError(message) {
            showStatus(message, 'error');
        }
        
        function formatTimestamp(timestamp) {
            if (!timestamp) return '';
            
            try {
                const date = new Date(timestamp);
                if (isNaN(date.getTime())) return timestamp;
                
                const day = String(date.getDate()).padStart(2, '0');
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const year = date.getFullYear();
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                const seconds = String(date.getSeconds()).padStart(2, '0');
                
                return `${day}-${month}-${year} ${hours}:${minutes}:${seconds}`;
            } catch (e) {
                return timestamp;
            }
        }
        
        function formatValueForDisplay(value, headerName) {
            if (!value || value === '') return '-';
            
            if (!headerName) return escapeHtml(value);
            
            const headerLower = headerName.toLowerCase();
            const isTimestamp = headerLower.includes('timestamp') || 
                                (headerLower.includes('waktu') && !headerLower.includes('selesai')) ||
                                headerLower.includes('tanggal');
            
            if (isTimestamp) {
                return formatTimestamp(value);
            }
            
            return escapeHtml(value);
        }
        
        function showDetailInfo(rowData) {
            const detailInfo = document.getElementById('detailInfo');
            let html = '';
            
            // Fields to exclude (internal fields)
            const excludeFields = ['rowNumber', 'id'];
            
            // Get all keys and sort them for better display
            const keys = Object.keys(rowData).filter(key => !excludeFields.includes(key));
            
            // Sort keys: put important fields first, then alphabetical
            const priorityFields = ['Timestamp', 'Nama Lengkap', 'Nama', 'Pilih Permintaan', 'Jenis Permintaan', 
                                   'Alasan Permintaan', 'Email', 'Status', 'Flag', 'Petugas', 'Waktu Selesai', 
                                   'Keterangan', 'Persetujuan'];
            
            keys.sort((a, b) => {
                const aIndex = priorityFields.findIndex(f => a.toLowerCase().includes(f.toLowerCase()));
                const bIndex = priorityFields.findIndex(f => b.toLowerCase().includes(f.toLowerCase()));
                
                if (aIndex !== -1 && bIndex !== -1) return aIndex - bIndex;
                if (aIndex !== -1) return -1;
                if (bIndex !== -1) return 1;
                return a.localeCompare(b);
            });
            
            keys.forEach(key => {
                const value = rowData[key];
                if (value !== null && value !== undefined && value !== '') {
                    html += `
                        <div class="detail-item">
                            <label>${escapeHtml(key)}</label>
                            <div class="value">${formatValueForDisplay(value, key)}</div>
                        </div>
                    `;
                }
            });
            
            detailInfo.innerHTML = html;
        }
        
        let validatedPin = null; // Store validated PIN
        let rowData = null;
        let rowNumber = null;

        function showPinModal() {
            const modal = document.getElementById('pinModal');
            modal.classList.add('show');
            
            // Reset PIN inputs
            document.getElementById('pin1').value = '';
            document.getElementById('pin2').value = '';
            document.getElementById('pin3').value = '';
            document.getElementById('pin4').value = '';
            document.getElementById('pinError').textContent = '';
            
            // Focus first input
            setTimeout(() => {
                document.getElementById('pin1').focus();
            }, 100);
        }

        function hidePinModal() {
            const modal = document.getElementById('pinModal');
            modal.classList.remove('show');
        }
        
        function showMainContent() {
            document.getElementById('mainContent').style.display = 'flex';
            document.getElementById('footerSection').style.display = 'block';
        }

        function getPin() {
            const pin1 = document.getElementById('pin1').value;
            const pin2 = document.getElementById('pin2').value;
            const pin3 = document.getElementById('pin3').value;
            const pin4 = document.getElementById('pin4').value;
            return pin1 + pin2 + pin3 + pin4;
        }

        // Setup PIN input navigation
        document.addEventListener('DOMContentLoaded', () => {
            const pinInputs = ['pin1', 'pin2', 'pin3', 'pin4'];
            
            pinInputs.forEach((id, index) => {
                const input = document.getElementById(id);
                if (!input) return;
                
                input.addEventListener('input', (e) => {
                    const value = e.target.value.replace(/[^0-9]/g, '');
                    e.target.value = value;
                    
                    if (value && index < pinInputs.length - 1) {
                        document.getElementById(pinInputs[index + 1]).focus();
                    }
                });
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        document.getElementById(pinInputs[index - 1]).focus();
                    }
                });
            });

            // PIN Submit handler
            const pinSubmitBtn = document.getElementById('pinSubmitBtn');
            if (pinSubmitBtn) {
                pinSubmitBtn.addEventListener('click', async () => {
                    const pin = getPin();
                    
                    if (pin.length !== 4) {
                        document.getElementById('pinError').textContent = 'PIN harus 4 digit';
                        return;
                    }
                    
                    pinSubmitBtn.disabled = true;
                    pinSubmitBtn.textContent = 'Memverifikasi...';
                    document.getElementById('pinError').textContent = '';
                    
                    try {
                        // Validate PIN - ensure it's exactly 4 digits, no spaces
                        const cleanPin = pin.replace(/\s/g, ''); // Remove any spaces
                        
                        if (cleanPin.length !== 4) {
                            throw new Error('PIN harus 4 digit angka');
                        }
                        
                        const validateUrl = new URL(API_URL, window.location.origin);
                        validateUrl.searchParams.append('action', 'validateApprovalPin');
                        validateUrl.searchParams.append('pin', cleanPin);
                        
                        const validateResponse = await fetch(validateUrl.toString(), {
                            method: 'GET',
                            mode: 'cors',
                            cache: 'no-cache'
                        });
                        
                        const validateResult = await validateResponse.json();
                        
                        // Debug logging - detailed
                        console.log('=== PIN VALIDATION DEBUG ===');
                        console.log('Input PIN (clean):', cleanPin);
                        console.log('Input PIN length:', cleanPin.length);
                        console.log('Full Response:', validateResult);
                        console.log('Response JSON:', JSON.stringify(validateResult));
                        
                        // Handle different response formats
                        let validationData = null;
                        if (validateResult.data) {
                            validationData = validateResult.data;
                            console.log('Using result.data format');
                        } else {
                            validationData = validateResult;
                            console.log('Using result format directly');
                        }
                        
                        if (validationData.debug) {
                            console.log('Debug Info:', validationData.debug);
                        }
                        console.log('===========================');
                        
                        // Check response format - handle both result.valid and result.data.valid
                        let isValid = false;
                        if (validationData.valid === true) {
                            isValid = true;
                        } else if (validateResult.success === true && validationData.valid === true) {
                            isValid = true;
                        } else if (validateResult.success === false || validationData.valid === false) {
                            isValid = false;
                        }
                        
                        console.log('Is Valid:', isValid);
                        console.log('validationData.valid:', validationData.valid);
                        console.log('validateResult.success:', validateResult.success);
                        
                        if (!isValid) {
                            const errorMsg = validationData.message || validateResult.message || 'PIN tidak valid';
                            console.error('PIN validation failed:', errorMsg);
                            if (validationData.debug) {
                                console.error('Debug details:', validationData.debug);
                            }
                            throw new Error(errorMsg);
                        }
                        
                        // Use clean PIN for further processing
                        validatedPin = cleanPin;
                        console.log('PIN validated successfully:', validatedPin);
                        hidePinModal();
                        
                        // Load and show data after PIN validation
                        await loadAndShowData();
                        
                    } catch (error) {
                        document.getElementById('pinError').textContent = error.message || 'PIN tidak valid';
                        pinSubmitBtn.disabled = false;
                        pinSubmitBtn.textContent = 'Verifikasi PIN';
                        
                        // Reset PIN on error
                        document.getElementById('pin1').value = '';
                        document.getElementById('pin2').value = '';
                        document.getElementById('pin3').value = '';
                        document.getElementById('pin4').value = '';
                        document.getElementById('pin1').focus();
                    }
                });
            }

            // Enter key to submit PIN
            document.getElementById('pin4')?.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('pinSubmitBtn').click();
                }
            });
            
            // Show PIN modal on page load
            showPinModal();
        });

        async function processApproval(rowId, action, pin) {
            try {
                const url = new URL(API_URL, window.location.origin);
                url.searchParams.append('action', 'batchUpdate');
                url.searchParams.append('table', 'permintaan');
                url.searchParams.append('rowNumber', rowId);
                url.searchParams.append('persetujuan', action === 'approve' ? 'Disetujui' : 'Ditolak');
                url.searchParams.append('pin', pin);
                
                if (action === 'reject') {
                    url.searchParams.append('status', 'Cancelled');
                }
                
                const response = await fetch(url.toString(), {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache'
                });
                
                if (!response.ok) {
                    throw new Error('Gagal memproses persetujuan');
                }
                
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error || 'Gagal memproses persetujuan');
                }
                
                return true;
            } catch (error) {
                console.error('Error:', error);
                throw error;
            }
        }
        
        // Function to load and show data after PIN validation
        async function loadAndShowData() {
            const urlParams = new URLSearchParams(window.location.search);
            const rowId = urlParams.get('rowId');
            
            if (!rowId) {
                showError('Row ID tidak ditemukan');
                return;
            }
            
            try {
                showStatus('Memuat data...', 'loading');
                showMainContent();
                
                const url = new URL(API_URL, window.location.origin);
                url.searchParams.append('action', 'getData');
                url.searchParams.append('table', 'permintaan');
                url.searchParams.append('_t', Date.now());
                
                const response = await fetch(url.toString(), {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache'
                });
                
                if (!response.ok) {
                    throw new Error('Gagal memuat data');
                }
                
                const dataResult = await response.json();
                
                if (!dataResult.success) {
                    throw new Error(dataResult.error || 'Gagal memuat data');
                }
                
                // Find row by rowNumber
                let foundRowData = null;
                let foundRowNumber = null;
                
                // Try to find by rowNumber
                for (const row of dataResult.data) {
                    if (row.rowNumber && row.rowNumber.toString() === rowId.toString()) {
                        foundRowData = row;
                        foundRowNumber = row.rowNumber;
                        break;
                    }
                }
                
                // If not found, try by index
                if (!foundRowData) {
                    const index = parseInt(rowId);
                    if (!isNaN(index) && index >= 2 && index <= dataResult.data.length + 1) {
                        const arrayIndex = index - 2;
                        if (arrayIndex >= 0 && arrayIndex < dataResult.data.length) {
                            foundRowData = dataResult.data[arrayIndex];
                            foundRowNumber = index;
                        }
                    }
                }
                
                if (!foundRowData || !foundRowNumber) {
                    throw new Error('Data tidak ditemukan');
                }
                
                rowData = foundRowData;
                rowNumber = foundRowNumber;
                
                // Check if already processed
                const persetujuan = (rowData.Persetujuan || rowData.persetujuan || '').trim();
                if (persetujuan) {
                    if (persetujuan.toLowerCase().includes('disetujui') || persetujuan.toLowerCase().includes('approved')) {
                        showStatus('Permintaan ini sudah disetujui sebelumnya.', 'success');
                        showDetailInfo(rowData);
                        document.getElementById('actionButtons').style.display = 'none';
                        return;
                    } else if (persetujuan.toLowerCase().includes('ditolak') || persetujuan.toLowerCase().includes('rejected')) {
                        showStatus('Permintaan ini sudah ditolak sebelumnya.', 'error');
                        showDetailInfo(rowData);
                        document.getElementById('actionButtons').style.display = 'none';
                        return;
                    }
                }
                
                // Show detail and buttons
                showDetailInfo(rowData);
                document.getElementById('actionButtons').style.display = 'flex';
                document.getElementById('statusMessage').style.display = 'none';
                
                // Setup buttons (no need for PIN again, already validated)
                const approveBtn = document.getElementById('approveBtn');
                const rejectBtn = document.getElementById('rejectBtn');
                
                approveBtn.onclick = async () => {
                    if (approveBtn.disabled) return;
                    
                    try {
                        approveBtn.disabled = true;
                        rejectBtn.disabled = true;
                        approveBtn.innerHTML = '<span>⏳</span><span>Memproses...</span>';
                        
                        await processApproval(rowNumber, 'approve', validatedPin);
                        
                        // Reload data untuk menampilkan hasil terbaru
                        const reloadUrl = new URL(API_URL, window.location.origin);
                        reloadUrl.searchParams.append('action', 'getData');
                        reloadUrl.searchParams.append('table', 'permintaan');
                        reloadUrl.searchParams.append('_t', Date.now());
                        
                        const reloadResponse = await fetch(reloadUrl.toString(), {
                            method: 'GET',
                            mode: 'cors',
                            cache: 'no-cache'
                        });
                        
                        if (reloadResponse.ok) {
                            const reloadResult = await reloadResponse.json();
                            if (reloadResult.success) {
                                // Find updated row
                                let updatedRowData = null;
                                for (const row of reloadResult.data) {
                                    if (row.rowNumber && row.rowNumber.toString() === rowNumber.toString()) {
                                        updatedRowData = row;
                                        break;
                                    }
                                }
                                
                                if (updatedRowData) {
                                    showDetailInfo(updatedRowData);
                                }
                            }
                        }
                        
                        showStatus('Permintaan berhasil disetujui!', 'success');
                        document.getElementById('actionButtons').style.display = 'none';
                        
                    } catch (error) {
                        console.error('Error:', error);
                        showError('Gagal menyetujui permintaan: ' + error.message);
                        approveBtn.disabled = false;
                        rejectBtn.disabled = false;
                        approveBtn.innerHTML = '<span>✅</span><span>Setujui Permintaan</span>';
                    }
                };
                
                rejectBtn.onclick = async () => {
                    if (rejectBtn.disabled) return;
                    
                    if (!confirm('Apakah Anda yakin ingin menolak permintaan ini?')) {
                        return;
                    }
                    
                    try {
                        approveBtn.disabled = true;
                        rejectBtn.disabled = true;
                        rejectBtn.innerHTML = '<span>⏳</span><span>Memproses...</span>';
                        
                        await processApproval(rowNumber, 'reject', validatedPin);
                        
                        // Reload data untuk menampilkan hasil terbaru
                        const reloadUrl = new URL(API_URL, window.location.origin);
                        reloadUrl.searchParams.append('action', 'getData');
                        reloadUrl.searchParams.append('table', 'permintaan');
                        reloadUrl.searchParams.append('_t', Date.now());
                        
                        const reloadResponse = await fetch(reloadUrl.toString(), {
                            method: 'GET',
                            mode: 'cors',
                            cache: 'no-cache'
                        });
                        
                        if (reloadResponse.ok) {
                            const reloadResult = await reloadResponse.json();
                            if (reloadResult.success) {
                                // Find updated row
                                let updatedRowData = null;
                                for (const row of reloadResult.data) {
                                    if (row.rowNumber && row.rowNumber.toString() === rowNumber.toString()) {
                                        updatedRowData = row;
                                        break;
                                    }
                                }
                                
                                if (updatedRowData) {
                                    showDetailInfo(updatedRowData);
                                }
                            }
                        }
                        
                        showStatus('Permintaan berhasil ditolak! Status otomatis menjadi Cancelled.', 'error');
                        document.getElementById('actionButtons').style.display = 'none';
                        
                    } catch (error) {
                        console.error('Error:', error);
                        showError('Gagal menolak permintaan: ' + error.message);
                        approveBtn.disabled = false;
                        rejectBtn.disabled = false;
                        rejectBtn.innerHTML = '<span>❌</span><span>Tolak Permintaan</span>';
                    }
                };
                
            } catch (error) {
                console.error('Error:', error);
                showError('Terjadi kesalahan: ' + error.message);
            }
        }
        
    </script>
</body>
</html>
