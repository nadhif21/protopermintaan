<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Permintaan DOF</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="auth-logo-text">Permintaan DOF</div>
                </div>
            </div>
            
            <div class="auth-box">
                <div class="auth-box-header">
                    <span class="auth-icon">📝</span>
                    <h1>Daftar Akun Baru</h1>
                    <p>Isi formulir di bawah untuk mendaftar</p>
                </div>
                
                <form id="registerForm">
                    <div class="input-group">
                        <label for="nama">Nama Lengkap <span class="required">*</span></label>
                        <input type="text" id="nama" placeholder="Masukkan nama lengkap" required autocomplete="name">
                    </div>

                    <div class="input-group">
                        <label for="npk">NPK <span class="required">*</span></label>
                        <input type="text" id="npk" placeholder="Masukkan NPK" required autocomplete="username">
                    </div>

                    <div class="input-group">
                        <label for="nomor_telepon">Nomor Telepon <span class="required">*</span></label>
                        <input type="tel" id="nomor_telepon" placeholder="08xxxxxxxxxx" required autocomplete="tel">
                        <div class="form-hint">Format: 08xxxxxxxxxx (untuk notifikasi WhatsApp)</div>
                    </div>

                    <div class="input-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <input type="email" id="email" placeholder="nama@example.com" required autocomplete="email">
                    </div>

                    <div class="input-group">
                        <label for="unit_kerja">Unit Kerja <span class="required">*</span></label>
                        <select id="unit_kerja" required>
                            <option value="">Pilih Unit Kerja</option>
                        </select>
                    </div>

                    <div id="errorMessage" class="error-message"></div>
                    <div id="successMessage" class="success-message"></div>
                    
                    <button type="submit" class="auth-btn" id="submitBtn">
                        <span>Daftar</span>
                    </button>

                    <div class="auth-footer">
                        <p>Sudah punya akun? <a href="https://infoadkor.com/permintaandof/login.html">Masuk di sini</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
