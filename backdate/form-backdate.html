<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input Data Backdate</title>
    <link rel="stylesheet" href="backdate.css">
    <style>
        .form-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .form-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .form-header h1 {
            color: #333;
            margin: 0;
            font-size: 1.8rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }
        
        .form-group label.required::after {
            content: " *";
            color: #e74c3c;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4CAF50;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }
        
        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit {
            background: #4CAF50;
            color: white;
        }
        
        .btn-submit:hover:not(:disabled) {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(76, 175, 80, 0.3);
        }
        
        .btn-cancel {
            background: #f44336;
            color: white;
        }
        
        .btn-cancel:hover {
            background: #da190b;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            z-index: 10000;
            transform: translateX(400px);
            transition: transform 0.3s;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .notification.success {
            background: #4CAF50;
        }
        
        .notification.error {
            background: #f44336;
        }
        
        .help-text {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <a href="../" class="back-link">← Kembali</a>
                <span class="header-icon">📝</span>
                <h1>Form Input Data Backdate</h1>
                <button id="logoutBtn" class="logout-btn" title="Logout">🚪</button>
            </div>
        </header>

        <div class="form-container">
            <div class="form-header">
                <h1>Input Data Backdate</h1>
                <p style="color: #888; margin-top: 10px;">Silakan isi form di bawah ini dengan lengkap</p>
            </div>

            <form id="backdateForm">
                <div class="form-group">
                    <label for="namaAdmin" class="required">Nama Admin</label>
                    <select id="namaAdmin" name="namaAdmin" required>
                        <option value="">Pilih Admin</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="npk" class="required">NPK</label>
                    <input type="text" id="npk" name="npk" required placeholder="NPK akan terisi otomatis" readonly>
                </div>

                <div class="form-group">
                    <label for="jabatan" class="required">Jabatan</label>
                    <input type="text" id="jabatan" name="jabatan" required placeholder="Jabatan akan terisi otomatis" readonly>
                </div>

                <div class="form-group">
                    <label for="tanggalBackdate" class="required">Tanggal Pembukaan Backdate</label>
                    <input type="date" id="tanggalBackdate" name="tanggalBackdate" required>
                    <div class="help-text">Pilih tanggal pembukaan backdate</div>
                </div>

                <div class="form-group">
                    <label for="alasanBackdate" class="required">Alasan Pembukaan Backdate</label>
                    <textarea id="alasanBackdate" name="alasanBackdate" required placeholder="Diisi alasan dan siapa yang memberikan perintah pembukaan backdate"></textarea>
                    <div class="help-text">Jelaskan alasan dan siapa yang memberikan perintah</div>
                </div>

                <div class="form-group">
                    <label for="namaDibuka" class="required">Nama yang Dibuka Backdate</label>
                    <input type="text" id="namaDibuka" name="namaDibuka" required placeholder="Masukkan nama yang dibuka backdate">
                </div>

                <div class="form-group">
                    <label for="departemen" class="required">Departemen yang dibukakan Backdate</label>
                    <select id="departemen" name="departemen" required>
                        <option value="">Pilih Departemen</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="nomorSurat" class="required">Nomor Surat Backdate DOF</label>
                    <input type="text" id="nomorSurat" name="nomorSurat" required placeholder="Masukkan nomor surat backdate DOF">
                </div>

                <div class="form-group">
                    <label for="email" class="required">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Masukkan email address">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="window.location.href='../'">Batal</button>
                    <button type="submit" class="btn btn-submit" id="submitBtn">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="../auth.js"></script>
    <script>
        const API_URL = '../api.php';
        
        // Data petugas/admin
        const PETUGAS_DATA = {
            'Ulfa Ilma': {
                npk: '4144345',
                jabatan: 'Staf Kearsipan dan Administrasi'
            },
            'Abdul Jalal': {
                npk: 'KNEB20017',
                jabatan: 'Staf kearsipan dan Administrasi'
            },
            'Bayu Prasetyo Aji': {
                npk: '0',
                jabatan: 'Staf Kearsipan dan Administrasi'
            }
        };
        
        // Data unit kerja/departemen
        const UNIT_KERJA_LIST = [
            'Dep Keamanan',
            'Dep Manajemen Aset',
            'Dep Pelayanan Umum',
            'Dep. Administrasi Korporat',
            'Dep. Administrasi Pemasaran & Penjualan',
            'Dep. Akuntansi',
            'Dep. Anggaran',
            'Dep. Audit Bisnis & Keuangan',
            'Dep. Bengkel',
            'Dep. Bisnis dan Administrasi',
            'Dep. Hubungan Investor',
            'Dep. Hukum',
            'Dep. Inspeksi Teknik 1',
            'Dep. Inspeksi Teknik 2',
            'Dep. IT Service Business Partner',
            'Dep. Keandalan Pabrik',
            'Dep. Keselamatan & Kesehatan Kerja',
            'Dep. Keuangan',
            'Dep. Komunikasi Korporat',
            'Dep. Konsultasi & Jaminan Kualitas',
            'Dep. Laboratorium',
            'Dep. Lingkungan Hidup',
            'Dep. Manajemen & Pengembangan SDM',
            'Dep. Manajemen Risiko Korporasi',
            'Dep. Manufacturing',
            'Dep. Operasi Pabrik 1A',
            'Dep. Operasi Pabrik 2',
            'Dep. Operasi Pabrik 3',
            'Dep. Operasi Pabrik 4',
            'Dep. Operasi Pabrik 5',
            'Dep. Operasi Pabrik 6 / EX P1',
            'Dep. Operasi Pabrik 7',
            'Dep. Operasional SDM',
            'Dep. Pelabuhan dan Pengapalan',
            'Dep. Pelaporan Manajemen',
            'Dep. Pemeliharaan Instrumen',
            'Dep. Pemeliharaan Listrik',
            'Dep. Pemeliharaan Mekanik',
            'Dep. Pengadaan Barang',
            'Dep. Pengadaan Jasa',
            'Dep. Pengelolaan Pelanggan',
            'Dep. Pengembangan Korporat',
            'Dep. Perencanaan & Monitoring',
            'Dep. Perencanaan & Pengendalian Har.',
            'Dep. Perencanaan & Pengendalian TA',
            'Dep. Perencanaan Penerimaan& Pergudangan',
            'Dep. Portofolio Bisnis',
            'Dep. Proses & Pengelolaan Energi',
            'Dep. Rekayasa & Konstruksi',
            'Dep. Riset',
            'Dep. Sistem Manajemen Terpadu & Inovasi',
            'Dep. Strategic Delivery Unit',
            'Dep. Teknik dan Kontrol Kualitas',
            'Departemen TJSL',
            'Direktur Keuangan dan Umum',
            'Direktur Manajemen Risiko',
            'Direktur Operasi',
            'Direktur Pengembangan',
            'Direktur Utama',
            'Komp. Administrasi Keuangan',
            'Komp. HSE & Teknologi',
            'Komp. Operasi 1',
            'Komp. Operasi 2',
            'Komp. Pemeliharaan Pabrik',
            'Komp. Pengembangan & Portofolio Bisnis',
            'Komp. Rantai Pasok',
            'Komp. Satuan Pengawasan Intern',
            'Komp. SBU Jasa Pelayanan Pabrik',
            'Komp. SDM',
            'Komp. Sekretaris Perusahaan',
            'Komp. Tata Kelola & Manajemen Risiko',
            'Komp. Transformasi Bisnis',
            'Kompartemen Umum',
            'Proyek Soda Ash',
            'PT Katts',
            'PT KIE',
            'Sekretaris Dewan Komisaris',
            'VP Operasi Shift',
            'YKHT'
        ];
        
        // Check authentication
        if (!checkAuth()) {
            window.location.href = '../login.html';
        }

        const form = document.getElementById('backdateForm');
        const submitBtn = document.getElementById('submitBtn');
        const notification = document.getElementById('notification');
        const namaAdminSelect = document.getElementById('namaAdmin');
        const npkInput = document.getElementById('npk');
        const jabatanInput = document.getElementById('jabatan');
        const departemenSelect = document.getElementById('departemen');
        
        // Populate dropdown petugas
        function populatePetugasDropdown() {
            Object.keys(PETUGAS_DATA).forEach(nama => {
                const option = document.createElement('option');
                option.value = nama;
                option.textContent = nama;
                namaAdminSelect.appendChild(option);
            });
        }
        
        // Populate dropdown departemen
        function populateDepartemenDropdown() {
            if (!departemenSelect) {
                console.error('departemenSelect tidak ditemukan');
                return;
            }
            if (!UNIT_KERJA_LIST || UNIT_KERJA_LIST.length === 0) {
                console.error('UNIT_KERJA_LIST tidak terdefinisi atau kosong');
                return;
            }
            UNIT_KERJA_LIST.forEach(departemen => {
                const option = document.createElement('option');
                option.value = departemen;
                option.textContent = departemen;
                departemenSelect.appendChild(option);
            });
        }
        
        // Auto-fill NPK dan Jabatan ketika admin dipilih
        namaAdminSelect.addEventListener('change', function() {
            const selectedNama = this.value;
            if (selectedNama && PETUGAS_DATA[selectedNama]) {
                const data = PETUGAS_DATA[selectedNama];
                npkInput.value = data.npk || '';
                jabatanInput.value = data.jabatan || '';
            } else {
                npkInput.value = '';
                jabatanInput.value = '';
            }
        });
        
        // Initialize dropdown saat halaman dimuat
        populatePetugasDropdown();
        populateDepartemenDropdown();

        function showNotification(message, type = 'success') {
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (submitBtn.disabled) return;
            
            // Validasi client-side sebelum submit
            const namaAdmin = namaAdminSelect.value.trim();
            const npk = npkInput.value.trim();
            const jabatan = jabatanInput.value.trim();
            const tanggalBackdate = document.getElementById('tanggalBackdate').value.trim();
            const alasanBackdate = document.getElementById('alasanBackdate').value.trim();
            const namaDibuka = document.getElementById('namaDibuka').value.trim();
            const departemen = departemenSelect.value.trim();
            const nomorSurat = document.getElementById('nomorSurat').value.trim();
            const email = document.getElementById('email').value.trim();
            
            const missingFields = [];
            if (!namaAdmin || namaAdmin === '') missingFields.push('Nama Admin');
            if (!npk) missingFields.push('NPK');
            if (!jabatan) missingFields.push('Jabatan');
            if (!tanggalBackdate) missingFields.push('Tanggal Pembukaan Backdate');
            if (!alasanBackdate) missingFields.push('Alasan Pembukaan Backdate');
            if (!namaDibuka) missingFields.push('Nama yang Dibuka Backdate');
            if (!departemen) missingFields.push('Departemen');
            if (!nomorSurat) missingFields.push('Nomor Surat Backdate DOF');
            if (!email) missingFields.push('Email Address');
            
            if (missingFields.length > 0) {
                showNotification('Field wajib yang belum diisi: ' + missingFields.join(', '), 'error');
                return;
            }
            
            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Menyimpan...';
            
            // Get form data - pastikan semua field termasuk readonly terkirim
            const data = {
                namaAdmin: namaAdmin,
                npk: npk,
                jabatan: jabatan,
                tanggalBackdate: tanggalBackdate,
                alasanBackdate: alasanBackdate,
                namaDibuka: namaDibuka,
                departemen: departemen,
                nomorSurat: nomorSurat,
                email: email
            };
            
            try {
                // Build URL with parameters
                const url = new URL(API_URL, window.location.origin);
                url.searchParams.append('action', 'insertBackdate');
                Object.keys(data).forEach(key => {
                    if (data[key] !== undefined && data[key] !== null) {
                        url.searchParams.append(key, data[key]);
                    }
                });
                
                const response = await fetch(url.toString(), {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache'
                });
                
                if (!response.ok) {
                    throw new Error('HTTP Error: ' + response.status);
                }
                
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error || 'Gagal menyimpan data');
                }
                
                showNotification('Data berhasil disimpan!', 'success');
                
                // Reset form after 1 second
                setTimeout(() => {
                    form.reset();
                    // Clear dan re-populate dropdown setelah reset
                    namaAdminSelect.innerHTML = '<option value="">Pilih Admin</option>';
                    populatePetugasDropdown();
                    departemenSelect.innerHTML = '<option value="">Pilih Departemen</option>';
                    populateDepartemenDropdown();
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Simpan Data';
                    
                    // Optionally redirect to backdate list
                    if (confirm('Data berhasil disimpan! Apakah Anda ingin melihat data backdate?')) {
                        window.location.href = 'backdate.html';
                    }
                }, 1000);
                
            } catch (error) {
                console.error('Error:', error);
                showNotification('Error: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Simpan Data';
            }
        });

        // Logout button
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function() {
                if (confirm('Apakah Anda yakin ingin logout?')) {
                    logout();
                }
            });
        }
    </script>
</body>
</html>
