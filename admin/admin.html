<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Super Admin - Data Permintaan DOF</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="container admin-container">
        <header>
            <div class="header-content">
                <span class="header-icon">🛡️</span>
                <h1>Panel Super Admin</h1>
                <div class="header-actions">
                    <a href="../index.html" class="btn-link" title="Kembali ke menu">🏠</a>
                    <button id="logoutBtn" class="logout-btn" title="Logout">🚪</button>
                </div>
            </div>
            <div class="subheader">
                <div id="currentUserInfo" class="current-user"></div>
                <div class="hint">Fitur ini hanya untuk Super Admin.</div>
            </div>
        </header>

        <main class="admin-main">
            <section class="panel">
                <div class="panel-header">
                    <h2>Manajemen User</h2>
                    <div class="panel-actions">
                        <button id="refreshUsersBtn" class="btn">Refresh</button>
                        <button id="openCreateUserBtn" class="btn btn-primary">+ Buat User</button>
                    </div>
                </div>

                <div class="table-wrap">
                    <table class="admin-table" id="usersTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Nama</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Dibuat</th>
                                <th>Update</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="usersTbody">
                            <tr><td colspan="8" class="loading">Memuat...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>

    <!-- Modal Create User -->
    <div id="createUserModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Buat User Baru</h3>
                <button id="closeCreateUserModal" class="icon-btn" title="Tutup">✕</button>
            </div>
            <form id="createUserForm" class="form">
                <div class="form-row">
                    <label>Username</label>
                    <input type="text" id="newUsername" placeholder="mis: operator1" required>
                    <div class="form-hint">3-50 karakter: huruf/angka/._-</div>
                </div>
                <div class="form-row">
                    <label>Nama</label>
                    <input type="text" id="newName" placeholder="Nama lengkap" required>
                </div>
                <div class="form-row">
                    <label>Role</label>
                    <select id="newRole" required>
                        <option value="user">user</option>
                        <option value="admin">admin</option>
                        <option value="super_admin">super_admin</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>Password</label>
                    <input type="password" id="newPassword" placeholder="Password awal" required>
                </div>
                <div id="createUserError" class="error-box"></div>
                <div class="form-actions">
                    <button type="button" id="cancelCreateUserBtn" class="btn">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../auth.js"></script>
    <script src="admin.js"></script>
</body>
</html>
